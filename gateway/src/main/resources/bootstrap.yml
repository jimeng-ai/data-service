spring:
  application:
    name: gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: data-server
          uri: lb://data-server
          predicates:
            - Path=/data/**
    nacos:
      # 默认 localhost（本地 IDE 直跑）；容器部署时由 NACOS_SERVER_ADDR 覆盖
      server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
#      username: nacos
#      password: nacos
      discovery:
        namespace: ${NACOS_NAMESPACE:fe9e39ae-06af-49c3-9c5b-6060df2cf93e}
      config:
        shared-configs:
          - data-id: gateway.yml
            refresh: true
          - data-id: default-mysql.yml
            refresh: true
        namespace: ${NACOS_NAMESPACE:fe9e39ae-06af-49c3-9c5b-6060df2cf93e}
        file-extension: yml
        group: DEFAULT_GROUP
