spring:
  application:
    name: data-server
  # FreeMarker 是被传递依赖引入的，本项目不用模板渲染，关掉自动模板目录检查避免启动 WARN
  freemarker:
    check-template-location: false
  cloud:
    nacos:
      server-addr: localhost:8848
#      username: nacos
#      password: nacos
      discovery:
        namespace: fe9e39ae-06af-49c3-9c5b-6060df2cf93e
      config:
        shared-configs:
          - data-id: data-server.yml
            refresh: true
          - data-id: default-mysql.yml
            refresh: true
          - data-id: default-redis.yml
            refresh: true
          - data-id: default-rabbitmq.yml
            refresh: true
          - data-id: default-okhttp.yml
            refresh: true
          - data-id: knife4j.yml
            refresh: true
        namespace: fe9e39ae-06af-49c3-9c5b-6060df2cf93e
        file-extension: yml
        group: DEFAULT_GROUP

ai:
  provider: 302ai                # 全局一把闸：openrouter | 302ai（与 providers.* 下的 key 对应，重启生效）
  system-prompt: "## 角色定义
你是一个高度智能、全能的通用型个人智能助手。你具备广泛的知识基础和强大的逻辑推理能力、工具（Skill/Tool）调用决策能力，你能够精准理解用户意图，自主评估任务需求。你的核心目标是为用户提供精准、可靠、全方位的协助。

## 限制条件
- 绝对禁止捏造事实、伪造数据、提供虚假信息或推测工具未返回的数据（零幻觉）。
- 严禁提供涉及违法、违规、暴力、色情或违背伦理道德的内容。
- 避免带有强烈的个人主观情绪或偏见，始终保持中立的顾问立场。
- 禁止在上下文信息已足够支撑准确回答的情况下滥用或强制调用工具。
- 禁止在缺少关键必填参数或参数不合法时尝试强行调用工具。"

providers:
  openrouter:
    base-url: https://openrouter.ai/api/v1
    api-key: ${OPENROUTER_API_KEY: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}
    timeout: 30s
    chat:
      protocol: anthropic                       # anthropic | openai
      model: anthropic/claude-opus-4.6
      max-tokens: 8192
    embedding:
      protocol: openai
      model: openai/text-embedding-ada-002
      dims: 1536                                # 必须与 ES kb_chunks 索引维度一致
      endpoint-path: /embeddings
    rerank:
      protocol: cohere                          # cohere 兼容（results: [{index, relevance_score}]）
      model: cohere/rerank-4-pro
      endpoint-path: /rerank
    contextualization:
      text-model: anthropic/claude-haiku-4.5
      image-model: anthropic/claude-sonnet-4.6
      max-output-tokens: 200
      use-prompt-cache: true                    # 仅 chat.protocol=anthropic 时生效

  302ai:
    base-url: https://api.302.ai/v1
    api-key: ${API_302_KEY:sk-8Mljg14TOepf0qxw801tQxpc0vBEf9sbQzvMZLIh9BjZipjC}
    timeout: 30s
    chat:
      protocol: anthropic                       # 走 302.ai 的 messages 通道；如改走 /cc 把 base-url 改成 https://api.302.ai/cc 即可
      model: claude-opus-4-6
      max-tokens: 8192
    embedding:
      protocol: openai
      model: text-embedding-ada-002             # 302.ai 支持
      dims: 1536
      endpoint-path: /embeddings
    rerank:
      protocol: qwen3                           # qwen3 走 /v1/reranks，需 instruct 字段
      model: qwen3-rerank
      endpoint-path: /reranks
      extra-params:
        instruct: "Given the query, find passages that answer it."
    contextualization:
      text-model: claude-haiku-4-5-20251001
      image-model: claude-sonnet-4-6
      max-output-tokens: 200
      use-prompt-cache: true

rag:
  elasticsearch:
    hosts: "http://localhost:9200"
    username:
    password:
    index-name: kb_chunks
    connection-timeout: 5s
    socket-timeout: 60s
  chunk:
    target-size-tokens: 600
    max-size-tokens: 800
    overlap-tokens: 80
    sentence-splitter: "(?<=[。！？.!?])\\s+"
  contextualization:
    enabled: true
    prompt-cache-ttl-seconds: 300
  retrieval:
    bm25-top-k: 50
    vector-top-k: 50
    rrf-rank-constant: 60
    rerank-top-k: 10
  ingestion:
    queue: rag.ingestion
    concurrency: 2
    max-retries: 3
    minio-bucket: rag-documents

skill:
  enabled: true
  explicit-prefix: "$"
  max-tool-rounds: 10
  max-selected: 3
  skill-system-prompt: "## 角色定义
你是一个高度智能、全能的通用型个人智能助手。你具备广泛的知识基础和强大的逻辑推理能力、工具（Skill/Tool）调用决策能力，你能够精准理解用户意图，自主评估任务需求。你的核心目标是为用户提供精准、可靠、全方位的协助。

## 限制条件
- 绝对禁止捏造事实、伪造数据、提供虚假信息或推测工具未返回的数据（零幻觉）。
- 严禁提供涉及违法、违规、暴力、色情或违背伦理道德的内容。
- 避免带有强烈的个人主观情绪或偏见，始终保持中立的顾问立场。
- 禁止在上下文信息已足够支撑准确回答的情况下滥用或强制调用工具。
- 禁止在缺少关键必填参数或参数不合法时尝试强行调用工具。"
