spring:
  application:
    name: data-server
  cloud:
    nacos:
      server-addr: localhost:8848
#      username: nacos
#      password: nacos
      discovery:
        namespace: fe9e39ae-06af-49c3-9c5b-6060df2cf93e
      config:
        shared-configs:
          - data-id: data-server.yml
            refresh: true
          - data-id: default-mysql.yml
            refresh: true
          - data-id: default-redis.yml
            refresh: true
          - data-id: default-rabbitmq.yml
            refresh: true
          - data-id: default-okhttp.yml
            refresh: true
          - data-id: knife4j.yml
            refresh: true
        namespace: fe9e39ae-06af-49c3-9c5b-6060df2cf93e
        file-extension: yml
        group: DEFAULT_GROUP