spring:
  application:
    name: data-server
  # FreeMarker 是被传递依赖引入的，本项目不用模板渲染，关掉自动模板目录检查避免启动 WARN
  freemarker:
    check-template-location: false
  cloud:
    nacos:
      # 默认 localhost（本地 IDE 直跑）；容器部署时由 NACOS_SERVER_ADDR 覆盖
      server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
#      username: nacos
#      password: nacos
      discovery:
        namespace: ${NACOS_NAMESPACE:fe9e39ae-06af-49c3-9c5b-6060df2cf93e}
      config:
        shared-configs:
          - data-id: data-server.yml
            refresh: true
          - data-id: default-mysql.yml
            refresh: true
          - data-id: default-redis.yml
            refresh: true
          - data-id: default-rabbitmq.yml
            refresh: true
          - data-id: default-okhttp.yml
            refresh: true
          - data-id: knife4j.yml
            refresh: true
        namespace: ${NACOS_NAMESPACE:fe9e39ae-06af-49c3-9c5b-6060df2cf93e}
        file-extension: yml
        group: DEFAULT_GROUP
