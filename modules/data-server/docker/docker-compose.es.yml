# 本地 RAG 开发环境：单节点 Elasticsearch 8.13.4 + IK 中文分词插件 + Kibana 8.13.4
#
# 启动：docker compose -f docker/docker-compose.es.yml up -d
# 停止：docker compose -f docker/docker-compose.es.yml down
# 验证：
#   curl http://localhost:9200
#   curl http://localhost:9200/_cat/plugins?v   # 应能看到 analysis-ik
#   curl -XPOST 'http://localhost:9200/_analyze' -H 'Content-Type: application/json' \
#        -d '{"analyzer":"ik_max_word","text":"中文分词测试"}'
#   open http://localhost:5601                   # Kibana UI（首次启动需等 30~60s 初始化）
#
# IK 插件版本与 Kibana 版本必须与 ES 镜像主版本号严格一致

services:
  elasticsearch:
    image: elasticsearch:8.13.4
    container_name: rag-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - ELASTIC_PASSWORD=changeme
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - rag-es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    # 首次启动自动安装 IK 分词插件（与 ES 主版本号严格对齐）
    command: >
      bash -c "
        if ! ./bin/elasticsearch-plugin list | grep -q analysis-ik; then
          ./bin/elasticsearch-plugin install --batch https://release.infinilabs.com/analysis-ik/stable/elasticsearch-analysis-ik-8.13.4.zip;
        fi &&
        /usr/local/bin/docker-entrypoint.sh
      "

  kibana:
    image: kibana:8.13.4
    container_name: rag-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_HOST=0.0.0.0
      - I18N_LOCALE=zh-CN
    ports:
      - "5601:5601"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  # 日志采集：抓取宿主机 ~/logs/data-server/*.log（LogstashEncoder JSON）→ ES
  # 如果 data-server 写日志到别处，改下面这一行 volume 即可
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.4
    container_name: rag-filebeat
    user: root                          # 需要 root 读宿主机挂入的文件
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ${HOME}/logs/data-server:/var/log/app:ro
    command: ["-e", "--strict.perms=false"]

volumes:
  rag-es-data:
    driver: local
