spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/base-service?serverTimezone=GMT%2B8
    username: root
    password: root
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
      max-lifetime: 30000
mybatis-plus:
  # Mapper XML 文件位置
  mapper-locations: classpath*:mapper/**/*.xml
  # 实体类扫描包
  type-aliases-package: com.jimeng.persistence.entity
  configuration:
    # 开启驼峰命名转换
    map-underscore-to-camel-case: true
    # 打印 SQL 日志（开发环境可开启）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl